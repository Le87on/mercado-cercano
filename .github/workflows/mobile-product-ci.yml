name: Mobile Product CI

on:
  push:
    branches:
      - mobile-product-development
  pull_request:
    paths:
      - "apps/mobile/**"
      - "apps/api/**"
      - ".github/workflows/mobile-product-ci.yml"

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm install
      - run: npm test
      - run: npm run typecheck

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm install
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
