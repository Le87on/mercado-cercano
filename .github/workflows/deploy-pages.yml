name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Detect output folder
        id: output
        shell: bash
        run: |
          if [ -d ".output/public" ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -d "build/client" ]; then
            echo "path=build/client" >> "$GITHUB_OUTPUT"
          else
            echo "No static output folder found"
            find . -maxdepth 3 -type d | sort
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
