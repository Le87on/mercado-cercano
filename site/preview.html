<!doctype html>
<html lang="es-AR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview · A la Vuelta Fresh Friendly</title>
<meta name="robots" content="noindex">
<style>
:root{--bg-app:#F4F7F5;--bg-card:#FFFFFF;--color-primary:#49A078;--color-secondary:#E6F4EA;--text-main:#22333B;--text-muted:#708090;--shadow:0 4px 12px rgba(0,0,0,.05)}
*{box-sizing:border-box}body{margin:0;background:var(--bg-app);color:var(--text-main);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:20px}.card{max-width:560px;background:var(--bg-card);border-radius:22px;box-shadow:var(--shadow);padding:24px}h1{margin:0 0 8px;font-size:26px;line-height:1.1}p{color:var(--text-muted);line-height:1.45}.btn{border:0;display:inline-block;background:var(--color-primary);color:white;text-decoration:none;border-radius:16px;padding:13px 16px;font-weight:900}.muted{font-size:13px;color:var(--text-muted)}
</style>
</head>
<body>
<main class="card" id="loader">
<h1>Abriendo preview Fresh & Friendly…</h1>
<p>Estoy cargando la versión de prueba desde la rama <b>fresh-friendly-marketplace-flow</b>.</p>
<p class="muted">Si queda cargando, actualizá esta página.</p>
</main>
<script>
(async()=>{
  const url='https://raw.githubusercontent.com/Le87on/mercado-cercano/fresh-friendly-marketplace-flow/site/index.html?v='+Date.now();
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const html=await res.text();
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.getElementById('loader').innerHTML='<h1>No pude abrir el preview</h1><p>Probá actualizar en unos segundos.</p><p class="muted">Detalle: '+String(err).replace(/[<>]/g,'')+'</p>';
  }
})();
</script>
</body>
</html>
